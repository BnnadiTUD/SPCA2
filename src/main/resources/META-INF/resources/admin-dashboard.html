<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 30px;
      background: linear-gradient(to bottom right, #ececec, #dcdcdc);
      color: #222;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      border: 1px solid #d7d7d7;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 34px;
      font-weight: bold;
      color: #222;
    }

    h2 {
      margin-top: 35px;
      margin-bottom: 15px;
      font-size: 24px;
      font-weight: bold;
      color: #2a2a2a;
      border-bottom: 2px solid #e6e6e6;
      padding-bottom: 8px;
    }

    p {
      color: #555;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #333;
    }

    input, textarea, button, select {
      width: 100%;
      padding: 12px 14px;
      margin-top: 5px;
      margin-bottom: 15px;
      border: 1px solid #c9c9c9;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #777;
      box-shadow: 0 0 0 3px rgba(120,120,120,0.12);
    }

    button {
      width: auto;
      cursor: pointer;
      margin-right: 10px;
      background: #4f4f4f;
      color: white;
      border: none;
      font-weight: bold;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    button:hover {
      background: #2f2f2f;
      transform: translateY(-1px);
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .panel {
      background: #f8f8f8;
      border: 1px solid #e1e1e1;
      border-radius: 14px;
      padding: 20px;
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: white;
      overflow: hidden;
      border-radius: 12px;
    }

    th, td {
      border: 1px solid #d8d8d8;
      padding: 12px;
      text-align: left;
    }

    th {
      background: #e9e9e9;
      font-weight: bold;
    }

    tr:hover {
      background: #f5f5f5;
    }

    .message {
      padding: 12px 14px;
      margin-bottom: 15px;
      border-radius: 8px;
      font-weight: bold;
    }

    .success {
      background: #ececec;
      color: #222;
      border: 1px solid #cfcfcf;
    }

    .error {
      background: #fbe9e9;
      color: #9b1c1c;
      border: 1px solid #efc5c5;
    }
    
    #customersTableBody tr {
      cursor: pointer;
    }

    dialog {
      width: 650px;
      max-width: 92%;
      border: none;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    .dialog-actions {
      margin-top: 20px;
      text-align: right;
    }

    @media (max-width: 768px) {
      .row {
        grid-template-columns: 1fr;
      }

      .button-group {
        flex-direction: column;
      }

      .button-group button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Admin Dashboard</h1>
    <div class="button-group">
      <button onclick="logout()">Logout</button>
    </div>
    <p>This page is used to manage store items, stock, customers, and customer orders from the frontend.</p>

    <div id="messageBox"></div>

    <div class="panel">
      <h2>Create / Update Item</h2>

      <div class="row">
        <div>
          <label for="title">Title</label>
          <input type="text" id="title" />
        </div>

        <div>
          <label for="manufacturer">Manufacturer</label>
          <input type="text" id="manufacturer" />
        </div>

        <div>
          <label for="category">Category</label>
          <input type="text" id="category" />
        </div>

        <div>
          <label for="price">Price</label>
          <input type="number" step="0.01" id="price" />
        </div>

        <div>
          <label for="stockQuantity">Stock Quantity</label>
          <input type="number" id="stockQuantity" />
        </div>
        
        <div>
  <label for="pictureLink">Image URL / Path</label>
  <input type="text" id="pictureLink" placeholder="e.g. images/hoodie.jpg" />
</div>

        <div>
          <label for="itemId">Selected Item ID</label>
          <input type="number" id="itemId" />
        </div>
      </div>

      <label for="description">Description</label>
      <textarea id="description" rows="4"></textarea>

      <div class="button-group">
        <button onclick="createItem()">Create Item</button>
        <button onclick="updateItem()">Update Item</button>
        <button onclick="deleteItem()">Delete Item</button>
        <button onclick="loadItems()">Load All Items</button>
      </div>
    </div>

    <div class="panel">
      <h2>Search and Sort</h2>

      <div class="row">
        <div>
          <label for="searchTitle">Search Title</label>
          <input type="text" id="searchTitle" />
        </div>

        <div>
          <label for="searchManufacturer">Search Manufacturer</label>
          <input type="text" id="searchManufacturer" />
        </div>

        <div>
          <label for="searchCategory">Search Category</label>
          <input type="text" id="searchCategory" />
        </div>

        <div>
          <label for="sortBy">Sort By</label>
          <select id="sortBy">
            <option value="">None</option>
            <option value="title">Title</option>
            <option value="manufacturer">Manufacturer</option>
            <option value="category">Category</option>
            <option value="price">Price</option>
            <option value="stockQuantity">Stock Quantity</option>
          </select>
        </div>

        <div>
          <label for="sortDirection">Sort Direction</label>
          <select id="sortDirection">
            <option value="asc">Ascending</option>
            <option value="desc">Descending</option>
          </select>
        </div>

        <div>
          <label for="newStockQuantity">New Stock Quantity</label>
          <input type="number" id="newStockQuantity" />
        </div>
      </div>

      <div class="button-group">
        <button onclick="searchItems()">Search Items</button>
        <button onclick="updateStock()">Update Stock</button>
      </div>
    </div>

    <div class="panel">
      <h2>Items</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Manufacturer</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Image</th>
          </tr>
        </thead>
        <tbody id="itemsTableBody"></tbody>
      </table>
    </div>
     
    <div class="panel">
      <h2>Customers</h2>
      <div class="button-group">
        <button onclick="loadCustomers()">Load Customers</button>
      </div>

      <table>
          <thead>
              <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Address</th>
              </tr>
          </thead>
          <tbody id="customersTableBody"></tbody>
      </table>
    </div>
  </div>
 

  <script>
    const baseUrl = 'http://localhost:8080/admin/items';

    function showMessage(text, isError = false) {
      const box = document.getElementById('messageBox');
      box.innerHTML = `<div class="message ${isError ? 'error' : 'success'}">${text}</div>`;
    }

    function getItemData() {
      return {
        title: document.getElementById('title').value.trim(),
        manufacturer: document.getElementById('manufacturer').value.trim(),
        category: document.getElementById('category').value.trim(),
        price: parseFloat(document.getElementById('price').value),
        description: document.getElementById('description').value.trim(),
        stockQuantity: parseInt(document.getElementById('stockQuantity').value, 10),
        pictureLink: document.getElementById('pictureLink').value.trim()

        
      };
    }

    function clearForm() {
    	  document.getElementById('itemId').value = '';
    	  document.getElementById('title').value = '';
    	  document.getElementById('manufacturer').value = '';
    	  document.getElementById('category').value = '';
    	  document.getElementById('price').value = '';
    	  document.getElementById('description').value = '';
    	  document.getElementById('stockQuantity').value = '';
    	  document.getElementById('pictureLink').value = '';
    	  document.getElementById('newStockQuantity').value = '';
    	}
    
    async function createItem() {
      try {
        const response = await fetch(baseUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(getItemData())
        });

        const text = await response.text();

        if (!response.ok) {
          throw new Error(text || 'Failed to create item');
        }

        showMessage('Item created successfully');
        loadItems();
        clearForm();

      } catch (error) {
        showMessage(error.message, true);
      }
    }

    async function updateItem() {
      const id = document.getElementById('itemId').value;

      if (!id) {
        showMessage('Enter an item ID to update', true);
        return;
      }

      try {
        const response = await fetch(`${baseUrl}/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(getItemData())
        });

        const text = await response.text();

        if (!response.ok) {
          throw new Error(text || 'Failed to update item');
        }

        showMessage('Item updated successfully');
        loadItems();
        clearForm();

      } catch (error) {
        showMessage(error.message, true);
      }
    }

    async function deleteItem() {
      const id = document.getElementById('itemId').value;

      if (!id) {
        showMessage('Enter an item ID to delete', true);
        return;
      }

      try {
        const response = await fetch(`${baseUrl}/${id}`, {
          method: 'DELETE'
        });

        const text = await response.text();

        if (!response.ok) {
          throw new Error(text || 'Failed to delete item');
        }

        showMessage('Item deleted successfully');
        loadItems();
        clearForm();

      } catch (error) {
        showMessage(error.message, true);
      }
    }

    async function updateStock() {
      const id = document.getElementById('itemId').value;
      const newStockQuantity = document.getElementById('newStockQuantity').value;

      if (!id) {
        showMessage('Enter an item ID to update stock', true);
        return;
      }

      try {
        const response = await fetch(`${baseUrl}/${id}/stock`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            stockQuantity: parseInt(newStockQuantity, 10)
          })
        });

        const text = await response.text();

        if (!response.ok) {
          throw new Error(text || 'Failed to update stock');
        }

        showMessage('Stock updated successfully');
        loadItems();
        clearForm();

      } catch (error) {
        showMessage(error.message, true);
      }
    }

    async function loadItems() {
      try {
        const response = await fetch(baseUrl);

        if (!response.ok) {
          throw new Error('Failed to load items');
        }

        const items = await response.json();
        renderItems(items);

      } catch (error) {
        showMessage(error.message, true);
      }
    }

    async function searchItems() {
      const title = document.getElementById('searchTitle').value.trim();
      const manufacturer = document.getElementById('searchManufacturer').value.trim();
      const category = document.getElementById('searchCategory').value.trim();
      const sortBy = document.getElementById('sortBy').value;
      const sortDirection = document.getElementById('sortDirection').value;

      const params = new URLSearchParams();

      if (title) params.append('title', title);
      if (manufacturer) params.append('manufacturer', manufacturer);
      if (category) params.append('category', category);
      if (sortBy) params.append('sortBy', sortBy);
      if (sortDirection) params.append('sortDirection', sortDirection);

      try {
        const response = await fetch(`${baseUrl}/search?${params.toString()}`);

        if (!response.ok) {
          throw new Error('Failed to search items');
        }

        const items = await response.json();
        renderItems(items);

      } catch (error) {
        showMessage(error.message, true);
      }
    }

    function renderItems(items) {
      const tableBody = document.getElementById('itemsTableBody');
      tableBody.innerHTML = '';

      items.forEach(item => {
        const row = `
        	<tr onclick="selectItem(${item.id}, '${escapeText(item.title)}', '${escapeText(item.manufacturer)}', '${escapeText(item.category)}', ${item.price}, '${escapeText(item.description)}', ${item.stockQuantity}, '${escapeText(item.pictureLink)}')">
            <td>${item.id}</td>
            <td>${item.title}</td>
            <td>${item.manufacturer}</td>
            <td>${item.category}</td>
            <td>${item.price}</td>
            <td>${item.stockQuantity}</td>
            <td>
            ${item.pictureLink ? `<img src="${item.pictureLink}" alt="${item.title}" style="width:50px;height:50px;object-fit:cover;border-radius:6px;">` : ''}
          </td>         
          </tr>
        `;
        tableBody.innerHTML += row;
      });
    }

    function escapeText(text) {
      return String(text ?? '').replace(/'/g, "\\'");
    }

    function selectItem(id, title, manufacturer, category, price, description, stockQuantity, pictureLink) {
      document.getElementById('itemId').value = id;
      document.getElementById('title').value = title;
      document.getElementById('manufacturer').value = manufacturer;
      document.getElementById('category').value = category;
      document.getElementById('price').value = price;
      document.getElementById('description').value = description;
      document.getElementById('stockQuantity').value = stockQuantity;
      document.getElementById('pictureLink').value = pictureLink || '';

    }
    
    function logout() {
        localStorage.removeItem("adminId");
        window.location.href = "launcher.html";
    }
 
    loadItems();
    
    async function loadCustomers() {
        try {
            const response = await fetch("http://localhost:8080/admin/customers");

            if (!response.ok) {
                throw new Error("Failed to load customers");
            }

            const customers = await response.json();
            const tableBody = document.getElementById("customersTableBody");
            tableBody.innerHTML = "";

            customers.forEach(customer => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${customer.name}</td>
                    <td>${customer.email}</td>
                    <td>${customer.address || ""}</td>
                `;

                row.onclick = () => openCustomerOrdersDialog(customer.id, customer.name);

                tableBody.appendChild(row);
            });

        } catch (error) {
            console.error(error);
            alert(error.message);
        }
    }

    async function openCustomerOrdersDialog(customerId, customerName) {
        try {
            const response = await fetch(`http://localhost:8080/admin/customers/${customerId}/orders`);

            if (!response.ok) {
                throw new Error("Failed to load customer orders");
            }

            const orders = await response.json();
            const content = document.getElementById("customerOrdersContent");

            let html = `<p><strong>Customer:</strong> ${customerName}</p>`;

            if (!orders || orders.length === 0) {
                html += `<p>No past orders found.</p>`;
            } else {
                html += `
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Date</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                orders.forEach(order => {
                    html += `
                        <tr>
                            <td>${order.id}</td>
                            <td>${order.orderDate}</td>
                            <td>€${order.orderTotal.toFixed(2)}</td>
                        </tr>
                    `;
                });

                html += `
                        </tbody>
                    </table>
                `;
            }

            content.innerHTML = html;
            document.getElementById("customerOrdersDialog").showModal();

        } catch (error) {
            console.error(error);
            alert(error.message);
        }
    }
    
    loadCustomers();
    
  </script>

  <dialog id="customerOrdersDialog">
    <h2>Customer Orders</h2>
    <div id="customerOrdersContent"></div>
    <div class="dialog-actions">
      <button onclick="document.getElementById('customerOrdersDialog').close()">Close</button>
    </div>
  </dialog>
</body>
</html>
