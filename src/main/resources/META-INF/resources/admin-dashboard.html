<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #f5f5f5;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1, h2 {
      margin-top: 0;
    }

    input, textarea, button, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    button {
      width: auto;
      cursor: pointer;
      margin-right: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
    }

    th {
      background: #eee;
    }

    .message {
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 4px;
    }

    .success {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .error {
      background: #ffebee;
      color: #c62828;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Admin Dashboard</h1>
    <p>This page is used to test the admin item endpoints from the frontend.</p>

    <div id="messageBox"></div>

    <h2>Create / Update Item</h2>

    <div class="row">
      <div>
        <label for="title">Title</label>
        <input type="text" id="title" />
      </div>

      <div>
        <label for="manufacturer">Manufacturer</label>
        <input type="text" id="manufacturer" />
      </div>

      <div>
        <label for="category">Category</label>
        <input type="text" id="category" />
      </div>

      <div>
        <label for="price">Price</label>
        <input type="number" step="0.01" id="price" />
      </div>

      <div>
        <label for="stockQuantity">Stock Quantity</label>
        <input type="number" id="stockQuantity" />
      </div>

      <div>
        <label for="itemId">Selected Item ID</label>
        <input type="number" id="itemId" />
      </div>
    </div>

    <label for="description">Description</label>
    <textarea id="description" rows="4"></textarea>

    <button onclick="createItem()">Create Item</button>
    <button onclick="updateItem()">Update Item</button>
    <button onclick="deleteItem()">Delete Item</button>
    <button onclick="loadItems()">Load All Items</button>

    <h2>Search and Sort</h2>

    <div class="row">
      <div>
        <label for="searchTitle">Search Title</label>
        <input type="text" id="searchTitle" />
      </div>

      <div>
        <label for="searchManufacturer">Search Manufacturer</label>
        <input type="text" id="searchManufacturer" />
      </div>

      <div>
        <label for="searchCategory">Search Category</label>
        <input type="text" id="searchCategory" />
      </div>

      <div>
        <label for="sortBy">Sort By</label>
        <select id="sortBy">
          <option value="">None</option>
          <option value="title">Title</option>
          <option value="manufacturer">Manufacturer</option>
          <option value="category">Category</option>
          <option value="price">Price</option>
          <option value="stockQuantity">Stock Quantity</option>
        </select>
      </div>

      <div>
        <label for="sortDirection">Sort Direction</label>
        <select id="sortDirection">
          <option value="asc">Ascending</option>
          <option value="desc">Descending</option>
        </select>
      </div>

      <div>
        <label for="newStockQuantity">New Stock Quantity</label>
        <input type="number" id="newStockQuantity" />
      </div>
    </div>

    <button onclick="searchItems()">Search Items</button>
    <button onclick="updateStock()">Update Stock</button>

    <h2>Items</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Manufacturer</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock</th>
        </tr>
      </thead>
      <tbody id="itemsTableBody"></tbody>
    </table>
  </div>

  <script>
    // This is the backend endpoint for all item admin actions
    const baseUrl = 'http://localhost:8080/admin/items';

    // show feedback to the user on the page
    function showMessage(text, isError = false) {
      const box = document.getElementById('messageBox');
      box.innerHTML = `<div class="message ${isError ? 'error' : 'success'}">${text}</div>`;
    }

    // ollect all item form values in one object
    function getItemData() {
      return {
        title: document.getElementById('title').value.trim(),
        manufacturer: document.getElementById('manufacturer').value.trim(),
        category: document.getElementById('category').value.trim(),
        price: parseFloat(document.getElementById('price').value),
        description: document.getElementById('description').value.trim(),
        stockQuantity: parseInt(document.getElementById('stockQuantity').value, 10)
      };
    }

    //  create a new item
    async function createItem() {
      try {
        const response = await fetch(baseUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(getItemData())
        });

        const text = await response.text();

        if (!response.ok) {
          throw new Error(text || 'Failed to create item');
        }

        showMessage('Item created successfully');
        loadItems();

      } catch (error) {
        showMessage(error.message, true);
      }
    }

    // I use this function to update an existing item
    async function updateItem() {
      const id = document.getElementById('itemId').value;

      if (!id) {
        showMessage('Enter an item ID to update', true);
        return;
      }

      try {
        const response = await fetch(`${baseUrl}/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(getItemData())
        });

        const text = await response.text();

        if (!response.ok) {
          throw new Error(text || 'Failed to update item');
        }

        showMessage('Item updated successfully');
        loadItems();

      } catch (error) {
        showMessage(error.message, true);
      }
    }

    // delete an item by id
    async function deleteItem() {
      const id = document.getElementById('itemId').value;

      if (!id) {
        showMessage('Enter an item ID to delete', true);
        return;
      }

      try {
        const response = await fetch(`${baseUrl}/${id}`, {
          method: 'DELETE'
        });

        const text = await response.text();

        if (!response.ok) {
          throw new Error(text || 'Failed to delete item');
        }

        showMessage('Item deleted successfully');
        loadItems();

      } catch (error) {
        showMessage(error.message, true);
      }
    }

    // update only the stock value of an item
    async function updateStock() {
      const id = document.getElementById('itemId').value;
      const newStockQuantity = document.getElementById('newStockQuantity').value;

      if (!id) {
        showMessage('Enter an item ID to update stock', true);
        return;
      }

      try {
        const response = await fetch(`${baseUrl}/${id}/stock`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            stockQuantity: parseInt(newStockQuantity, 10)
          })
        });

        const text = await response.text();

        if (!response.ok) {
          throw new Error(text || 'Failed to update stock');
        }

        showMessage('Stock updated successfully');
        loadItems();

      } catch (error) {
        showMessage(error.message, true);
      }
    }

    // load all items from the db
    async function loadItems() {
      try {
        const response = await fetch(baseUrl);

        if (!response.ok) {
          throw new Error('Failed to load items');
        }

        const items = await response.json();
        renderItems(items);

      } catch (error) {
        showMessage(error.message, true);
      }
    }

    //  search and sort items using query parameters
    async function searchItems() {
      const title = document.getElementById('searchTitle').value.trim();
      const manufacturer = document.getElementById('searchManufacturer').value.trim();
      const category = document.getElementById('searchCategory').value.trim();
      const sortBy = document.getElementById('sortBy').value;
      const sortDirection = document.getElementById('sortDirection').value;

      const params = new URLSearchParams();

      if (title) params.append('title', title);
      if (manufacturer) params.append('manufacturer', manufacturer);
      if (category) params.append('category', category);
      if (sortBy) params.append('sortBy', sortBy);
      if (sortDirection) params.append('sortDirection', sortDirection);

      try {
        const response = await fetch(`${baseUrl}/search?${params.toString()}`);

        if (!response.ok) {
          throw new Error('Failed to search items');
        }

        const items = await response.json();
        renderItems(items);

      } catch (error) {
        showMessage(error.message, true);
      }
    }

    //  display the items in the table
    function renderItems(items) {
      const tableBody = document.getElementById('itemsTableBody');
      tableBody.innerHTML = '';

      items.forEach(item => {
        const row = `
          <tr onclick="selectItem(${item.id}, '${escapeText(item.title)}', '${escapeText(item.manufacturer)}', '${escapeText(item.category)}', ${item.price}, '${escapeText(item.description)}', ${item.stockQuantity})">
            <td>${item.id}</td>
            <td>${item.title}</td>
            <td>${item.manufacturer}</td>
            <td>${item.category}</td>
            <td>${item.price}</td>
            <td>${item.stockQuantity}</td>
          </tr>
        `;
        tableBody.innerHTML += row;
      });
    }

    // stop quotes breaking the row click function
    function escapeText(text) {
      return String(text ?? '').replace(/'/g, "\\'");
    }

    //  load a selected item back into the form
    function selectItem(id, title, manufacturer, category, price, description, stockQuantity) {
      document.getElementById('itemId').value = id;
      document.getElementById('title').value = title;
      document.getElementById('manufacturer').value = manufacturer;
      document.getElementById('category').value = category;
      document.getElementById('price').value = price;
      document.getElementById('description').value = description;
      document.getElementById('stockQuantity').value = stockQuantity;
    }

    //  load all items when the page first opens
    loadItems();
  </script>
</body>
</html>
