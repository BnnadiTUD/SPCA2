<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 30px;
            background: linear-gradient(to bottom right, #ececec, #dcdcdc);
            color: #222;
        }

        h1, h2 {
            margin: 0;
            font-weight: bold;
        }

        .page-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
            background: white;
            padding: 20px 24px;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            border: 1px solid #d7d7d7;
        }

        .top-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .controls {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            border: 1px solid #d7d7d7;
        }

        .controls h2 {
            margin-bottom: 18px;
            font-size: 24px;
            border-bottom: 2px solid #ececec;
            padding-bottom: 8px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #333;
        }

        input, select, button {
            width: 100%;
            padding: 12px 14px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid #c8c8c8;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #777;
            box-shadow: 0 0 0 3px rgba(120,120,120,0.12);
        }

        button {
            cursor: pointer;
            border: none;
            background: #4f4f4f;
            color: white;
            font-weight: bold;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        button:hover {
            background: #2f2f2f;
            transform: translateY(-1px);
        }

        .items-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 22px;
        }

        .item-card {
            background: white;
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            border: 1px solid #d7d7d7;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .item-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 22px rgba(0,0,0,0.1);
        }

        .item-card h3 {
            margin-top: 0;
            margin-bottom: 14px;
            font-size: 20px;
            font-weight: bold;
            color: #222;
        }

        .item-card p {
            margin: 8px 0;
            color: #444;
        }

        .message {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #333;
        }

        .item-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 14px;
            background: #e3e3e3;
            border: 1px solid #d2d2d2;
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="top-bar">
            <h1 id="welcomeMessage">Welcome, Customer</h1>
            <div class="top-actions">
                <button onclick="goToCart()" style="width:auto;">View Cart</button>
                <button onclick="goToOrders()" style="width:auto;">View Orders</button>
                <button onclick="logout()" style="width:auto;">Logout</button>
            </div>
        </div>

        <div class="controls">
            <h2>Browse Items</h2>
            <div class="controls-grid">
                <div>
                    <label for="title">Search by Title</label>
                    <input type="text" id="title" placeholder="e.g. Hoodie">
                </div>

                <div>
                    <label for="manufacturer">Search by Manufacturer</label>
                    <input type="text" id="manufacturer" placeholder="e.g. Nike">
                </div>

                <div>
                    <label for="category">Search by Category</label>
                    <input type="text" id="category" placeholder="e.g. Jackets">
                </div>

                <div>
                    <label for="sortBy">Sort By</label>
                    <select id="sortBy">
                        <option value="">None</option>
                        <option value="title">Title</option>
                        <option value="manufacturer">Manufacturer</option>
                        <option value="price">Price</option>
                    </select>
                </div>

                <div>
                    <label for="sortDirection">Sort Direction</label>
                    <select id="sortDirection">
                        <option value="asc">Ascending</option>
                        <option value="desc">Descending</option>
                    </select>
                </div>

                <div style="display: flex; align-items: end;">
                    <button onclick="loadItems()">Search / Refresh</button>
                </div>
            </div>
        </div>

        <div id="message" class="message"></div>
        <div id="itemsContainer" class="items-container"></div>
    </div>

    <script>
        window.onload = function () {
            const customerName = localStorage.getItem("customerName");
            if (customerName) {
                document.getElementById("welcomeMessage").innerText = "Welcome, " + customerName;
            }

            loadItems();
        };

        async function loadItems() {
            const title = document.getElementById("title").value.trim();
            const manufacturer = document.getElementById("manufacturer").value.trim();
            const category = document.getElementById("category").value.trim();
            const sortBy = document.getElementById("sortBy").value;
            const sortDirection = document.getElementById("sortDirection").value;

            const messageDiv = document.getElementById("message");
            const container = document.getElementById("itemsContainer");

            messageDiv.innerText = "";
            container.innerHTML = "Loading items...";

            const params = new URLSearchParams();

            if (title) params.append("title", title);
            if (manufacturer) params.append("manufacturer", manufacturer);
            if (category) params.append("category", category);
            if (sortBy) params.append("sortBy", sortBy);
            if (sortDirection) params.append("sortDirection", sortDirection);

            const url = "/customers/items/search?" + params.toString();

            try {
                const response = await fetch(url);

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || "Failed to load items");
                }

                const items = await response.json();
                container.innerHTML = "";

                if (!items || items.length === 0) {
                    messageDiv.innerText = "No items found.";
                    return;
                }

                items.forEach(item => {
                    const imageHtml = item.pictureLink
                        ? `<img class="item-image" src="${item.pictureLink}" alt="${item.title}">`
                        : `<div class="item-image"></div>`;

                    const card = document.createElement("div");
                    card.className = "item-card";
                    card.innerHTML = `
                        ${imageHtml}
                        <h3>${item.title ?? "No title"}</h3>
                        <p><strong>Manufacturer:</strong> ${item.manufacturer ?? "N/A"}</p>
                        <p><strong>Category:</strong> ${item.category ?? "N/A"}</p>
                        <p><strong>Price:</strong> €${item.price ?? "N/A"}</p>
                        <p><strong>Stock:</strong> ${item.stockQuantity ?? item.stock ?? "N/A"}</p>
                        <p><strong>Average Rating:</strong> ${Number(item.averageRating ?? 0).toFixed(1)} / 5</p>
                        <p><strong>Reviews:</strong> ${item.reviewCount ?? 0}</p>

                        <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;">
                            <button onclick="addToCart(${item.id})" style="width:auto;">Add to Cart</button>
                            <button onclick="toggleReviews(${item.id})" style="width:auto;">View Reviews</button>
                            <button onclick="showReviewForm(${item.id})" style="width:auto;">Leave Review</button>
                        </div>

                        <div id="reviews-${item.id}" style="display:none; margin-top:14px;"></div>
                        <div id="review-form-${item.id}" style="display:none; margin-top:14px;"></div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = "";
                messageDiv.innerText = error.message;
            }
        }
        async function toggleReviews(itemId) {
            const reviewsDiv = document.getElementById(`reviews-${itemId}`);

            if (reviewsDiv.style.display === "block") {
                reviewsDiv.style.display = "none";
                reviewsDiv.innerHTML = "";
                return;
            }

            try {
                const response = await fetch(`/customers/items/${itemId}/reviews`);

                if (!response.ok) {
                    throw new Error("Failed to load reviews");
                }

                const reviews = await response.json();

                if (!reviews || reviews.length === 0) {
                    reviewsDiv.innerHTML = "<p>No reviews yet.</p>";
                } else {
                    reviewsDiv.innerHTML = `
                        <h4 style="margin-bottom:10px;">Customer Reviews</h4>
                        ${reviews.map(review => `
                            <div style="border:1px solid #ccc; padding:10px; margin-bottom:10px; border-radius:8px; background:#fafafa;">
                                <p><strong>${review.customerName ?? "Anonymous"}</strong> rated it ${review.rating}/5</p>
                                <p>${review.comment ?? ""}</p>
                                <small>${review.createdAt ?? ""}</small>
                            </div>
                        `).join("")}
                    `;
                }

                reviewsDiv.style.display = "block";
            } catch (error) {
                reviewsDiv.innerHTML = `<p style="color:red;">${error.message}</p>`;
                reviewsDiv.style.display = "block";
            }
        }
        
        function showReviewForm(itemId) {
            const formDiv = document.getElementById(`review-form-${itemId}`);

            if (formDiv.style.display === "block") {
                formDiv.style.display = "none";
                formDiv.innerHTML = "";
                return;
            }

            formDiv.innerHTML = `
                <h4 style="margin-bottom:10px;">Leave a Review</h4>
                <label for="rating-${itemId}">Rating</label>
                <select id="rating-${itemId}">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5" selected>5</option>
                </select>

                <label for="comment-${itemId}" style="margin-top:10px;">Comment</label>
                <textarea id="comment-${itemId}" rows="3" style="width:100%; padding:10px; border-radius:8px; border:1px solid #c8c8c8;"></textarea>

                <div style="margin-top:10px;">
                    <button onclick="submitReview(${itemId})" style="width:auto;">Submit Review</button>
                </div>
            `;

            formDiv.style.display = "block";
        }
        
        async function submitReview(itemId) {
            const customerId = localStorage.getItem("customerId");
            const rating = document.getElementById(`rating-${itemId}`).value;
            const comment = document.getElementById(`comment-${itemId}`).value.trim();

            if (!customerId) {
                alert("Customer not logged in.");
                return;
            }

            try {
                const response = await fetch(`/customers/items/${itemId}/reviews`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        customerId: Number(customerId),
                        rating: Number(rating),
                        comment: comment
                    })
                });

                if (!response.ok) {
                    throw new Error(await response.text() || "Failed to submit review");
                }

                alert("Review submitted successfully");

                const formDiv = document.getElementById(`review-form-${itemId}`);
                formDiv.style.display = "none";
                formDiv.innerHTML = "";

                await loadItems();
                setTimeout(() => toggleReviews(itemId), 100);

            } catch (error) {
                alert(error.message);
            }
        }
        
        async function addToCart(itemId) {
            const customerId = localStorage.getItem("customerId");

            try {
                const response = await fetch(
                    `/customers/cart/add?customerId=${customerId}&itemId=${itemId}&quantity=1`,
                    { method: "POST" }
                );

                if (!response.ok) {
                    throw new Error(await response.text());
                }

                alert("Item added to cart");
            } catch (err) {
                alert(err.message);
            }
        }
        
        function goToCart() {
            window.location.href = "cart.html";
        }

        function logout() {
            localStorage.removeItem("customerName");
            localStorage.removeItem("customerEmail");
            localStorage.removeItem("customerId");
            localStorage.removeItem("role");
            window.location.href = "launcher.html";
        }
        
        function goToOrders() {
            window.location.href = "orders.html";
        }
    </script>

</body>
</html>
