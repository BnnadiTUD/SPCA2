<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Launcher</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Admin Launcher</h1>
    <p>This page lets an admin either log in or register before going to the dashboard.</p>

    <div id="message"></div>

    <!-- I use this section for admin login -->
    <div id="loginSection">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <!-- I use this section to create a new admin account -->
    <div id="registerSection">
        <h2>Register</h2>
        <input type="text" id="registerName" placeholder="Name">
        <input type="email" id="registerEmail" placeholder="Email">
        <input type="password" id="registerPassword" placeholder="Password">
        <button onclick="register()">Register</button>
    </div>
</div>

<script>
    // Base URL for the admin endpoints in my Quarkus backend
    const baseUrl = "http://localhost:8080/admin";

    // I use this to show a success or error message on the page
    function showMessage(message, isError = false) {
        const messageBox = document.getElementById("message");
        messageBox.innerHTML = `<p class="${isError ? 'error' : 'success'}">${message}</p>`;
    }

    // This function logs an admin in
    async function login() {
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;

        // Basic frontend validation
        if (!email || !password) {
            showMessage("Please enter both email and password.", true);
            return;
        }

        try {
            const response = await fetch(`${baseUrl}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const text = await response.text();

            if (!response.ok) {
                throw new Error(text || "Invalid login");
            }

            showMessage("Login successful");

            // After login succeeds, I send the admin to the dashboard page
            window.location.href = "admin-dashboard.html";

        } catch (error) {
            showMessage(error.message, true);
        }
    }

    // This function registers a new admin in the database
    async function register() {
        const name = document.getElementById("registerName").value.trim();
        const email = document.getElementById("registerEmail").value.trim();
        const password = document.getElementById("registerPassword").value;

        // Basic frontend validation
        if (!name || !email || !password) {
            showMessage("Please fill in all register fields.", true);
            return;
        }

        try {
            const response = await fetch(`${baseUrl}/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, email, password })
            });

            const text = await response.text();

            if (!response.ok) {
                throw new Error(text || "Registration failed");
            }

            // I keep register simple: after registering, the user logs in
            showMessage("Registered successfully. You can now log in.");

        } catch (error) {
            showMessage(error.message, true);
        }
    }
</script>

</body>
</html>
