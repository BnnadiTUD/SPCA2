<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Orders</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f4f4f4;
        }

        h1 {
            margin-bottom: 20px;
        }

        .order {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .back-btn {
            margin-bottom: 20px;
            padding: 8px 12px;
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>My Orders</h1>

<button class="back-btn" onclick="goBack()">← Back to Shop</button>

<div id="ordersContainer"></div>

<script>
    const customerId = localStorage.getItem("customerId");

    if (!customerId) {
        alert("No customer logged in");
    }

    function goBack() {
        window.location.href = "customer-dashboard.html";
    }

    async function loadOrders() {
        try {
            const response = await fetch(`/customers/orders?customerId=${customerId}`);

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || "Could not load orders");
            }

            const orders = await response.json();

            const container = document.getElementById("ordersContainer");
            container.innerHTML = "";

            if (!orders || orders.length === 0) {
                container.innerHTML = "<p>No orders found.</p>";
                return;
            }

            orders.forEach(order => {
                const div = document.createElement("div");
                div.className = "order";

                div.innerHTML = `
                    <strong>Order ID:</strong> ${order.id}<br>
                    <strong>Date:</strong> ${order.orderDate}<br>
                    <strong>Total:</strong> €${order.orderTotal.toFixed(2)}
                `;

                container.appendChild(div);
            });

        } catch (error) {
            console.error(error);
            alert(error.message);
        }
    }

    loadOrders();
</script>

</body>
</html>
