<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 30px;
            background: linear-gradient(to bottom right, #ececec, #dcdcdc);
            color: #222;
        }

        .page-wrapper {
            max-width: 900px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: white;
            padding: 20px 24px;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            border: 1px solid #d7d7d7;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: bold;
        }

        .back-btn {
            padding: 12px 14px;
            background: #4f4f4f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .back-btn:hover {
            background: #2f2f2f;
            transform: translateY(-1px);
        }

        .order {
            background: white;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            border: 1px solid #d7d7d7;
        }

        .order p {
            margin: 8px 0;
            color: #444;
        }

        .empty-message {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            border: 1px solid #d7d7d7;
            text-align: center;
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <div class="top-bar">
        <h1>My Orders</h1>
        <button class="back-btn" onclick="goBack()">Back to Shop</button>
    </div>

    <div id="ordersContainer"></div>
</div>

<script>
    const customerId = localStorage.getItem("customerId");

    if (!customerId) {
        alert("No customer logged in");
    }

    function goBack() {
        window.location.href = "customer-dashboard.html";
    }

    async function loadOrders() {
        try {
            const response = await fetch(`/customers/orders?customerId=${customerId}`);

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || "Could not load orders");
            }

            const orders = await response.json();

            const container = document.getElementById("ordersContainer");
            container.innerHTML = "";

            if (!orders || orders.length === 0) {
                container.innerHTML = `<div class="empty-message">No orders found.</div>`;
                return;
            }

            orders.forEach(order => {
                const div = document.createElement("div");
                div.className = "order";

                div.innerHTML = `
                    <p><strong>Order ID:</strong> ${order.id}</p>
                    <p><strong>Date:</strong> ${order.orderDate}</p>
                    <p><strong>Total:</strong> €${order.orderTotal.toFixed(2)}</p>
                `;

                container.appendChild(div);
            });

        } catch (error) {
            console.error(error);
            alert(error.message);
        }
    }

    loadOrders();
</script>

</body>
</html>
