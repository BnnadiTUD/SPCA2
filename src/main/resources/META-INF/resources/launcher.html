<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Launcher</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 30px;
            background: linear-gradient(to bottom right, #ececec, #dcdcdc);
            color: #222;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 36px;
            font-weight: bold;
            color: #222;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 35px;
            font-size: 16px;
        }

        .container {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: stretch;
            flex-wrap: wrap;
            max-width: 1100px;
            margin: 0 auto;
        }

        .section {
            background: #ffffff;
            padding: 28px;
            border-radius: 16px;
            width: 460px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            border: 1px solid #d8d8d8;
        }

        .section h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 26px;
            font-weight: bold;
            color: #1f1f1f;
            border-bottom: 2px solid #e5e5e5;
            padding-bottom: 10px;
        }

        .form-box {
            border: 1px solid #dddddd;
            padding: 18px;
            margin-top: 18px;
            border-radius: 12px;
            background: #f8f8f8;
        }

        .form-box h3 {
            margin-top: 0;
            margin-bottom: 14px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin-top: 8px;
            margin-bottom: 12px;
            border: 1px solid #c9c9c9;
            border-radius: 8px;
            background: white;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #777;
            box-shadow: 0 0 0 3px rgba(120,120,120,0.12);
        }

        button {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 8px;
            background: #4f4f4f;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        button:hover {
            background: #2f2f2f;
            transform: translateY(-1px);
        }

        .message {
            margin-top: 10px;
            font-size: 14px;
            color: #444;
            min-height: 18px;
        }
    </style>
</head>
<body>

    <h1>Online Clothes Store</h1>
    <div class="subtitle">Login or register as an admin or customer to access the store system.</div>

    <div class="container">

        <div class="section">
            <h2>Admin</h2>

            <div class="form-box">
                <h3>Admin Login</h3>
                <input type="email" id="adminLoginEmail" placeholder="Email">
                <input type="password" id="adminLoginPassword" placeholder="Password">
                <button onclick="adminLogin()">Login</button>
                <div class="message" id="adminLoginMessage"></div>
            </div>

            <div class="form-box">
                <h3>Admin Register</h3>
                <input type="text" id="adminRegisterName" placeholder="Name">
                <input type="email" id="adminRegisterEmail" placeholder="Email">
                <input type="password" id="adminRegisterPassword" placeholder="Password">
                <button onclick="adminRegister()">Register</button>
                <div class="message" id="adminRegisterMessage"></div>
            </div>
        </div>

        <div class="section">
            <h2>Customer</h2>

            <div class="form-box">
                <h3>Customer Login</h3>
                <input type="email" id="customerLoginEmail" placeholder="Email">
                <input type="password" id="customerLoginPassword" placeholder="Password">
                <button onclick="customerLogin()">Login</button>
                <div class="message" id="customerLoginMessage"></div>
            </div>

            <div class="form-box">
                <h3>Customer Register (register with cash on delivery for a 5% discount)</h3>
                <input type="text" id="customerRegisterName" placeholder="Name">
                <input type="email" id="customerRegisterEmail" placeholder="Email">
                <input type="password" id="customerRegisterPassword" placeholder="Password">
                <input type="text" id="customerRegisterAddress" placeholder="Address">
                <select id="paymentMethod">
    <option value="CARD">Card</option>
    <option value="CASH_ON_DELIVERY">Cash on Delivery</option>
    <option value="PAYPAL">PayPal</option>
				</select>
                <button onclick="customerRegister()">Register</button>
                <div class="message" id="customerRegisterMessage"></div>
            </div>
        </div>

    </div>

    <script>
        async function adminLogin() {
            const email = document.getElementById("adminLoginEmail").value;
            const password = document.getElementById("adminLoginPassword").value;
            const message = document.getElementById("adminLoginMessage");

            try {
                const response = await fetch("/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                if (!response.ok) {
                    throw new Error("Admin login failed");
                }

                const data = await response.json();
                localStorage.setItem("adminName", data.name);
                localStorage.setItem("adminEmail", data.email);

                window.location.href = "admin-dashboard.html";
            } catch (error) {
                message.innerText = error.message;
            }
        }

        async function adminRegister() {
            const name = document.getElementById("adminRegisterName").value;
            const email = document.getElementById("adminRegisterEmail").value;
            const password = document.getElementById("adminRegisterPassword").value;
            const message = document.getElementById("adminRegisterMessage");

            try {
                const response = await fetch("/admin/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, password })
                });

                if (!response.ok) {
                    throw new Error("Admin registration failed");
                }

                const data = await response.json();
                localStorage.setItem("adminName", data.name);
                localStorage.setItem("adminEmail", data.email);

                window.location.href = "admin-dashboard.html";
            } catch (error) {
                message.innerText = error.message;
            }
        }

        async function customerLogin() {
            const email = document.getElementById("customerLoginEmail").value;
            const password = document.getElementById("customerLoginPassword").value;
            const message = document.getElementById("customerLoginMessage");

            try {
                const response = await fetch("/customers/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                if (!response.ok) {
                    throw new Error("Customer login failed");
                }

                const data = await response.json();

                // tore everything including payment method
                localStorage.setItem("customer", JSON.stringify(data));

                localStorage.setItem("customerName", data.name);
                localStorage.setItem("customerEmail", data.email);
                localStorage.setItem("customerId", data.id);
                localStorage.setItem("preferredPaymentMethod", data.preferredPaymentMethod); 

                window.location.href = "customer-dashboard.html";
            } catch (error) {
                message.innerText = error.message;
            }
        }

        async function customerRegister() {
            const name = document.getElementById("customerRegisterName").value;
            const email = document.getElementById("customerRegisterEmail").value;
            const password = document.getElementById("customerRegisterPassword").value;
            const address = document.getElementById("customerRegisterAddress").value;
            const paymentMethod = document.getElementById("paymentMethod").value; // NEW
            const message = document.getElementById("customerRegisterMessage");

            try {
                const response = await fetch("/customers/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name,
                        email,
                        password,
                        address,
                        preferredPaymentMethod: paymentMethod // NEW
                    })
                });

                if (!response.ok) {
                    throw new Error("Customer registration failed");
                }

                const data = await response.json();

                // ✅ store everything
                localStorage.setItem("customer", JSON.stringify(data));

                localStorage.setItem("customerName", data.name);
                localStorage.setItem("customerEmail", data.email);
                localStorage.setItem("customerId", data.id);
                localStorage.setItem("preferredPaymentMethod", data.preferredPaymentMethod); // NEW

                window.location.href = "customer-dashboard.html";
            } catch (error) {
                message.innerText = error.message;
            }
        }
    </script>

</body>
</html>
