<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f4f4f4;
        }

        h1, h2 {
            text-align: center;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .button-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 14px;
            cursor: pointer;
        }

        .cart-container {
            display: grid;
            gap: 20px;
            margin-top: 20px;
        }

        .cart-card {
            background: white;
            padding: 18px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .cart-card h3 {
            margin-top: 0;
        }

        .summary-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-top: 25px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .message {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
        }

        .empty-cart {
            text-align: center;
            margin-top: 40px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>My Cart</h1>
        <div class="button-row">
            <button onclick="goBack()">Back to Dashboard</button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div id="message" class="message"></div>
    <div id="cartContainer" class="cart-container"></div>

    <div id="summaryBox" class="summary-box" style="display:none;">
        <h2>Order Summary</h2>
        <p><strong>Total Items:</strong> <span id="totalItems">0</span></p>
        <p><strong>Total Price:</strong> €<span id="totalPrice">0.00</span></p>
        <button onclick="checkout()" style="width:100%;">Checkout</button>
    </div>

    <script>
        window.onload = function () {
            loadCart();
        };

        async function loadCart() {
            const customerId = localStorage.getItem("customerId");
            const messageDiv = document.getElementById("message");
            const container = document.getElementById("cartContainer");
            const summaryBox = document.getElementById("summaryBox");

            messageDiv.innerText = "";
            container.innerHTML = "Loading cart...";
            summaryBox.style.display = "none";

            if (!customerId) {
                container.innerHTML = "";
                messageDiv.innerText = "No logged-in customer found.";
                return;
            }

            try {
                const response = await fetch(`/customers/cart?customerId=${customerId}`);

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || "Failed to load cart");
                }

                const cartItems = await response.json();
                container.innerHTML = "";

                if (!cartItems || cartItems.length === 0) {
                    container.innerHTML = `<div class="empty-cart">Your cart is empty.</div>`;
                    return;
                }

                let totalPrice = 0;
                let totalItems = 0;

                cartItems.forEach(cartItem => {
                    const item = cartItem.item;
                    const quantity = cartItem.quantity || 0;
                    const price = item?.price || 0;
                    const subtotal = price * quantity;

                    totalPrice += subtotal;
                    totalItems += quantity;

                    const card = document.createElement("div");
                    card.className = "cart-card";
                    card.innerHTML = `
                        <h3>${item?.title ?? "No title"}</h3>
                        <p><strong>Manufacturer:</strong> ${item?.manufacturer ?? "N/A"}</p>
                        <p><strong>Category:</strong> ${item?.category ?? "N/A"}</p>
                        <p><strong>Unit Price:</strong> €${price.toFixed(2)}</p>
                        <p><strong>Quantity:</strong> ${quantity}</p>
                        <p><strong>Subtotal:</strong> €${subtotal.toFixed(2)}</p>
                        <button onclick="removeFromCart(${cartItem.id})">Remove</button>
                    `;
                    container.appendChild(card);
                });

                document.getElementById("totalItems").innerText = totalItems;
                document.getElementById("totalPrice").innerText = totalPrice.toFixed(2);
                summaryBox.style.display = "block";

            } catch (error) {
                container.innerHTML = "";
                messageDiv.innerText = error.message;
            }
        }

        async function removeFromCart(cartItemId) {
            const messageDiv = document.getElementById("message");
            messageDiv.innerText = "";

            try {
                const response = await fetch(
                    `/customers/cart/remove?cartItemId=${cartItemId}`,
                    {
                        method: "DELETE"
                    }
                );

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || "Failed to remove item");
                }

                messageDiv.innerText = "Item removed";
                
                // reload cart UI
                loadCart();

            } catch (error) {
                messageDiv.innerText = error.message;
            }
        }

        async function checkout() {
            const customerId = localStorage.getItem("customerId");

            if (!customerId) {
                alert("No logged-in customer found.");
                return;
            }

            try {
                const response = await fetch(`/customers/orders/checkout?customerId=${customerId}`, {
                    method: "POST"
                });

                const text = await response.text();

                if (!response.ok) {
                    throw new Error(text || "Checkout failed");
                }

                alert("Order placed successfully!");
                window.location.href = "orders.html";

            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        }

        function goBack() {
            window.location.href = "customer-dashboard.html";
        }

        function logout() {
            localStorage.removeItem("customerName");
            localStorage.removeItem("customerEmail");
            localStorage.removeItem("customerId");
            localStorage.removeItem("role");
            window.location.href = "launcher.html";
        }
    </script>

</body>
</html>
